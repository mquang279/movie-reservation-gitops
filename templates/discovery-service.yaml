apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Values.discoveryService.name }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: {{ .Values.discoveryService.name }}

  template:
    metadata:
      labels:
        app: {{ .Values.discoveryService.name }}

    spec:
      containers:
        - name: {{ .Values.discoveryService.name }}
          image: {{ .Values.discoveryService.image.repo}}:{{ .Values.discoveryService.image.tag }}
          imagePullPolicy: {{ .Values.discoveryService.image.pullPolicy}}

          ports:
            - containerPort: {{ .Values.discoveryService.service.targetPort}}

          env:
            - name: SERVER_PORT
              value: "8761"
---
apiVersion: v1
kind: Service

metadata:
  name: {{ .Values.discoveryService.name }}

spec:
  selector:
    app: {{ .Values.discoveryService.name }}

  type: {{ .Values.discoveryService.service.type }}

  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.discoveryService.service.port }}
      targetPort: {{ .Values.discoveryService.service.targetPort }}